<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#444"/><stop offset="30%" stop-color="#c0c0c0"/><stop offset="50%" stop-color="#e0e0e0"/><stop offset="70%" stop-color="#b0b0b0"/><stop offset="100%" stop-color="#333"/></linearGradient>
    <radialGradient id="waxGrad" cx="40%" cy="40%"><stop offset="0%" stop-color="#cc3300"/><stop offset="100%" stop-color="#661100"/></radialGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#555"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">STANT</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">14730  ·  Termostato 88°C</text>
  <g transform="translate(150,230)">
    <!-- Outer ring frame -->
    <circle cx="0" cy="-20" r="85" fill="none" stroke="#555" stroke-width="3"/>
    <circle cx="0" cy="-20" r="80" fill="#2a2a2a"/>
    <!-- Main body ring (brass/metal) -->
    <circle cx="0" cy="-20" r="70" fill="none" stroke="url(#metalGrad)" stroke-width="14"/>
    <!-- Mounting flange details -->
    <rect x="-85" y="-28" width="20" height="16" rx="2" fill="url(#metalGrad)"/>
    <rect x="65" y="-28" width="20" height="16" rx="2" fill="url(#metalGrad)"/>
    <!-- Wax element (center pellet, red) -->
    <circle cx="0" cy="-20" r="24" fill="url(#waxGrad)"/>
    <circle cx="0" cy="-20" r="16" fill="#aa2200"/>
    <!-- Valve plate / disk (closed position) -->
    <ellipse cx="0" cy="10" rx="50" ry="8" fill="#888"/>
    <ellipse cx="0" cy="8" rx="48" ry="6" fill="#aaa"/>
    <!-- Spring (below disk) -->
    <line x1="-35" y1="18" x2="-35" y2="60" stroke="#777" stroke-width="2.5"/>
    <line x1="-25" y1="24" x2="-25" y2="54" stroke="#888" stroke-width="2"/>
    <line x1="-15" y1="18" x2="-15" y2="60" stroke="#777" stroke-width="2.5"/>
    <line x1="-5" y1="24" x2="-5" y2="54" stroke="#888" stroke-width="2"/>
    <line x1="5" y1="18" x2="5" y2="60" stroke="#777" stroke-width="2.5"/>
    <line x1="15" y1="24" x2="15" y2="54" stroke="#888" stroke-width="2"/>
    <line x1="25" y1="18" x2="25" y2="60" stroke="#777" stroke-width="2.5"/>
    <line x1="35" y1="18" x2="35" y2="60" stroke="#777" stroke-width="2.5"/>
    <!-- Spring base ring -->
    <ellipse cx="0" cy="60" rx="38" ry="6" fill="#666"/>
    <!-- Temperature label -->
    <text x="0" cy="-20" y="-16" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" fill="#ff5533" font-weight="900">88°C</text>
    <text x="0" cy="-20" y="-4" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#cc3300">190°F</text>
    <!-- Junta included indicator -->
    <rect x="-40" y="72" width="80" height="10" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
    <text x="0" y="81" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#aaa">INCLUYE JUNTA</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Apertura:</text><text x="110" y="340" fill="#eee" font-weight="600">88°C (190°F)</text>
    <text x="20" y="358">Apertura plena:</text><text x="140" y="358" fill="#eee" font-weight="600">103°C</text>
    <text x="20" y="376">Apertura máx.:</text><text x="140" y="376" fill="#eee" font-weight="600">8 mm</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">Honda Civic / Accord</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#555"/>
</svg>
