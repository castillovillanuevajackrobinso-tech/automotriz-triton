<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="boschBlue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#001a4a"/><stop offset="30%" stop-color="#0033aa"/><stop offset="50%" stop-color="#0044cc"/><stop offset="70%" stop-color="#002a88"/><stop offset="100%" stop-color="#001040"/></linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#444"/><stop offset="40%" stop-color="#ccc"/><stop offset="60%" stop-color="#aaa"/><stop offset="100%" stop-color="#333"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#0033aa"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">BOSCH</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">0450905071  ·  Filtro Combustible</text>
  <g transform="translate(150,230)">
    <!-- Inlet hose barb -->
    <rect x="-8" y="-140" width="16" height="18" rx="3" fill="url(#metalGrad)"/>
    <rect x="-10" y="-130" width="20" height="5" rx="1" fill="#999"/>
    <rect x="-10" y="-122" width="20" height="5" rx="1" fill="#999"/>
    <!-- Top cap -->
    <ellipse cx="0" cy="-122" rx="30" ry="8" fill="#555"/>
    <rect x="-30" y="-122" width="60" height="12" fill="#555"/>
    <ellipse cx="0" cy="-110" rx="30" ry="8" fill="#444"/>
    <!-- Body cylinder -->
    <rect x="-30" y="-110" width="60" height="175" fill="url(#boschBlue)"/>
    <!-- Bosch logo area -->
    <rect x="-25" y="-70" width="50" height="70" rx="3" fill="rgba(255,255,255,0.08)"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial Black,Arial" font-size="11" fill="white" font-weight="900">BOSCH</text>
    <rect x="-20" y="-34" width="40" height="2" fill="#4488ff" opacity="0.6"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#aaccff">0450905071</text>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#8899cc">10 bar · 10 µm</text>
    <!-- Flow arrow label -->
    <text x="0" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#4488ff" opacity="0.5">→</text>
    <!-- Bottom cap + outlet -->
    <ellipse cx="0" cy="65" rx="30" ry="8" fill="#444"/>
    <rect x="-30" y="57" width="60" height="12" fill="#444"/>
    <ellipse cx="0" cy="65" rx="30" ry="8" fill="#333"/>
    <!-- Outlet barb -->
    <rect x="-8" y="65" width="16" height="18" rx="3" fill="url(#metalGrad)"/>
    <rect x="-10" y="72" width="20" height="5" rx="1" fill="#999"/>
    <rect x="-10" y="80" width="20" height="5" rx="1" fill="#999"/>
    <!-- Entry/Exit labels -->
    <text x="-40" y="-135" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#aaa">ENTRADA</text>
    <text x="-40" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#aaa">SALIDA</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#eee" font-weight="600">En línea</text>
    <text x="20" y="358">Presión máx.:</text><text x="125" y="358" fill="#eee" font-weight="600">10 bar</text>
    <text x="20" y="376">Micronaje:</text><text x="110" y="376" fill="#eee" font-weight="600">10 µm</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">VW Jetta / Golf / Beetle</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#0033aa"/>
</svg>
