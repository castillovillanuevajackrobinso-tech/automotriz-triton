<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="25%" stop-color="#c0c0c0"/><stop offset="50%" stop-color="#e0e0e0"/><stop offset="75%" stop-color="#b0b0b0"/><stop offset="100%" stop-color="#3a3a3a"/></linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d0d0d0"/><stop offset="50%" stop-color="#f0f0f0"/><stop offset="100%" stop-color="#a0a0a0"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#2a7a2a"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">MAHLE</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">52281  ·  Válvula de Admisión</text>
  <!-- Show 2 valves side by side -->
  <g transform="translate(95,230)">
    <!-- Valve stem -->
    <rect x="-5" y="-145" width="10" height="200" rx="3" fill="url(#steelGrad)"/>
    <!-- Stem keeper groove -->
    <rect x="-6" y="-148" width="12" height="5" rx="1" fill="#888"/>
    <rect x="-6" y="-143" width="12" height="5" rx="1" fill="#666"/>
    <!-- Valve head (mushroom) -->
    <ellipse cx="0" cy="56" rx="32" ry="9" fill="url(#headGrad)"/>
    <path d="M-32,56 L-5,20 L5,20 L32,56" fill="url(#headGrad)"/>
    <ellipse cx="0" cy="56" rx="32" ry="9" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Seat angle -->
    <path d="M-28,54 L-5,22 L5,22 L28,54" fill="none" stroke="#e02020" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Dimension arrow -->
    <text x="0" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#aaa">Ø 39 mm</text>
  </g>
  <g transform="translate(205,230)">
    <rect x="-5" y="-145" width="10" height="200" rx="3" fill="url(#steelGrad)"/>
    <rect x="-6" y="-148" width="12" height="5" rx="1" fill="#888"/>
    <rect x="-6" y="-143" width="12" height="5" rx="1" fill="#666"/>
    <ellipse cx="0" cy="56" rx="32" ry="9" fill="url(#headGrad)"/>
    <path d="M-32,56 L-5,20 L5,20 L32,56" fill="url(#headGrad)"/>
    <ellipse cx="0" cy="56" rx="32" ry="9" fill="none" stroke="#888" stroke-width="1"/>
    <path d="M-28,54 L-5,22 L5,22 L28,54" fill="none" stroke="#e02020" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <!-- Label between valves -->
  <text x="150" y="310" text-anchor="middle" font-family="Arial Black,Arial" font-size="9" fill="#666" letter-spacing="1">ACERO INOXIDABLE</text>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#eee" font-weight="600">Admisión</text>
    <text x="20" y="358">Diámetro cabeza:</text><text x="155" y="358" fill="#eee" font-weight="600">39 mm</text>
    <text x="20" y="376">Diámetro vástago:</text><text x="158" y="376" fill="#eee" font-weight="600">6 mm</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">VW Golf / Jetta 1.6L</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#2a7a2a"/>
</svg>
