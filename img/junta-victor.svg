<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a8a8a"/><stop offset="40%" stop-color="#d0d0d0"/><stop offset="60%" stop-color="#b0b0b0"/><stop offset="100%" stop-color="#6a6a6a"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="30" y="18" width="240" height="28" rx="4" fill="#2a6a8a"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="11" font-weight="900" fill="white" letter-spacing="1">VICTOR REINZ</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">VS50562  ·  Junta de Cabeza MLS</text>
  <g transform="translate(150,220)">
    <!-- Gasket body - rectangular MLS steel -->
    <rect x="-105" y="-110" width="210" height="165" rx="4" fill="url(#steelGrad)" stroke="#888" stroke-width="1"/>
    <!-- Layer lines (MLS = Multi Layer Steel) -->
    <rect x="-104" y="-107" width="208" height="2" fill="#aaa" opacity="0.5"/>
    <rect x="-104" y="-104" width="208" height="1" fill="#888" opacity="0.4"/>
    <rect x="-104" y="52" width="208" height="2" fill="#aaa" opacity="0.5"/>
    <!-- Cylinder bores (2 holes for Chevy/Matiz 3-cyl would be 3, but Chevy 4-cyl = 4) -->
    <!-- Using 4 cylinder bores -->
    <circle cx="-62" cy="-28" r="30" fill="#1a1a1a" stroke="#e02020" stroke-width="2.5"/>
    <circle cx="-62" cy="-28" r="26" fill="#1a1a1a" stroke="#888" stroke-width="0.5"/>
    <circle cx="0" cy="-28" r="30" fill="#1a1a1a" stroke="#e02020" stroke-width="2.5"/>
    <circle cx="0" cy="-28" r="26" fill="#1a1a1a" stroke="#888" stroke-width="0.5"/>
    <circle cx="62" cy="-28" r="30" fill="#1a1a1a" stroke="#e02020" stroke-width="2.5"/>
    <circle cx="62" cy="-28" r="26" fill="#1a1a1a" stroke="#888" stroke-width="0.5"/>
    <!-- Water passages -->
    <ellipse cx="-85" cy="20" rx="8" ry="12" fill="#1a1a1a" stroke="#4a8aaa" stroke-width="1.5"/>
    <ellipse cx="85" cy="20" rx="8" ry="12" fill="#1a1a1a" stroke="#4a8aaa" stroke-width="1.5"/>
    <ellipse cx="-85" cy="45" rx="6" ry="8" fill="#1a1a1a" stroke="#4a8aaa" stroke-width="1.5"/>
    <ellipse cx="85" cy="45" rx="6" ry="8" fill="#1a1a1a" stroke="#4a8aaa" stroke-width="1.5"/>
    <!-- Oil passages -->
    <circle cx="-85" cy="-80" r="6" fill="#1a1a1a" stroke="#c08020" stroke-width="1.5"/>
    <circle cx="85" cy="-80" r="6" fill="#1a1a1a" stroke="#c08020" stroke-width="1.5"/>
    <circle cx="-85" cy="-55" r="5" fill="#1a1a1a" stroke="#c08020" stroke-width="1.5"/>
    <circle cx="85" cy="-55" r="5" fill="#1a1a1a" stroke="#c08020" stroke-width="1.5"/>
    <!-- Bolt holes corners -->
    <circle cx="-95" cy="-95" r="7" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <circle cx="95" cy="-95" r="7" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <circle cx="-95" cy="45" r="7" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <circle cx="95" cy="45" r="7" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <circle cx="-95" cy="-25" r="5" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <circle cx="95" cy="-25" r="5" fill="#1a1a1a" stroke="#999" stroke-width="1.5"/>
    <!-- MLS label -->
    <text x="0" y="35" text-anchor="middle" font-family="Arial Black,Arial" font-size="9" fill="#888" letter-spacing="2">MLS · 3 CAPAS · 1.2mm</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Material:</text><text x="110" y="340" fill="#eee" font-weight="600">Acero multicapa (MLS)</text>
    <text x="20" y="358">Capas:</text><text x="110" y="358" fill="#eee" font-weight="600">3 · Espesor 1.2 mm</text>
    <text x="20" y="376">Diámetro bore:</text><text x="140" y="376" fill="#eee" font-weight="600">79 mm</text>
    <text x="20" y="394">Motor:</text><text x="110" y="394" fill="#eee" font-weight="600">Chevy 1.4L / Matiz 1.0L</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#2a6a8a"/>
</svg>
