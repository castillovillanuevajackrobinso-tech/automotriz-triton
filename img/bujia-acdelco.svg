<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="20%" stop-color="#c0c0c0"/><stop offset="50%" stop-color="#e8e8e8"/><stop offset="80%" stop-color="#b0b0b0"/><stop offset="100%" stop-color="#4a4a4a"/></linearGradient>
    <linearGradient id="ceramicGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#b8c8d8"/><stop offset="20%" stop-color="#ddeeff"/><stop offset="50%" stop-color="#eef8ff"/><stop offset="80%" stop-color="#c8d8e8"/><stop offset="100%" stop-color="#a8b8c8"/></linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a1a3a"/><stop offset="15%" stop-color="#4a4a88"/><stop offset="50%" stop-color="#6666aa"/><stop offset="85%" stop-color="#4a4a88"/><stop offset="100%" stop-color="#1a1a3a"/></linearGradient>
    <linearGradient id="threadGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#333"/><stop offset="30%" stop-color="#999"/><stop offset="50%" stop-color="#bbb"/><stop offset="70%" stop-color="#888"/><stop offset="100%" stop-color="#333"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="40" y="18" width="220" height="28" rx="4" fill="#1a3a88"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="11" font-weight="900" fill="white" letter-spacing="1">ACDelco</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">41-162  ·  Platino Doble</text>
  <rect x="80" y="72" width="140" height="18" rx="9" fill="#1a1a3a" stroke="#3344aa" stroke-width="1"/>
  <text x="150" y="85" text-anchor="middle" font-family="Arial Black,Arial" font-size="9" fill="#aabbff" letter-spacing="1">✦ DOUBLE PLATINUM ✦</text>
  <g transform="translate(150,245)">
    <rect x="-10" y="-162" width="20" height="16" rx="3" fill="url(#metalGrad)"/>
    <rect x="-6" y="-152" width="12" height="5" rx="1" fill="#555"/>
    <!-- Blue ceramic insulator (ACDelco style) -->
    <path d="M-13,-146 L13,-146 L16,-100 L-16,-100 Z" fill="url(#ceramicGrad)"/>
    <ellipse cx="0" cy="-130" rx="16" ry="3.5" fill="#c8d8e8" opacity="0.6"/>
    <ellipse cx="0" cy="-117" rx="15" ry="3" fill="#c0d0e0" opacity="0.5"/>
    <ellipse cx="0" cy="-104" rx="14.5" ry="2.5" fill="#b8c8d8" opacity="0.5"/>
    <path d="M-16,-100 L16,-100 L13,-78 L-13,-78 Z" fill="url(#ceramicGrad)"/>
    <!-- ACDelco gold band -->
    <rect x="-15" y="-91" width="30" height="6" rx="1" fill="#c0a020"/>
    <rect x="-22" y="-78" width="44" height="38" rx="3" fill="url(#hexGrad)"/>
    <text x="0" y="-54" text-anchor="middle" font-family="Arial" font-size="8" fill="#9999cc" letter-spacing="1">5/8"</text>
    <path d="M-20,-40 L20,-40 L18,-30 L-18,-30 Z" fill="#888"/>
    <path d="M-18,-30 L18,-30 L17,-26 L-17,-26 Z" fill="#aaa"/>
    <rect x="-13" y="-26" width="26" height="62" rx="1" fill="url(#threadGrad)"/>
    <line x1="-13" y1="-20" x2="13" y2="-20" stroke="#555" stroke-width="1.5"/>
    <line x1="-13" y1="-14" x2="13" y2="-14" stroke="#444" stroke-width="1"/>
    <line x1="-13" y1="-8" x2="13" y2="-8" stroke="#555" stroke-width="1.5"/>
    <line x1="-13" y1="-2" x2="13" y2="-2" stroke="#444" stroke-width="1"/>
    <line x1="-13" y1="4" x2="13" y2="4" stroke="#555" stroke-width="1.5"/>
    <line x1="-13" y1="10" x2="13" y2="10" stroke="#444" stroke-width="1"/>
    <line x1="-13" y1="16" x2="13" y2="16" stroke="#555" stroke-width="1.5"/>
    <line x1="-13" y1="22" x2="13" y2="22" stroke="#444" stroke-width="1"/>
    <line x1="-13" y1="28" x2="13" y2="28" stroke="#555" stroke-width="1.5"/>
    <path d="M-13,36 L13,36 L10,50 L-10,50 Z" fill="#888"/>
    <path d="M-10,50 L10,50 L7,58 L-7,58 Z" fill="#777"/>
    <!-- Platinum center electrode (small, bright silver/platinum) -->
    <rect x="-2" y="54" width="4" height="13" rx="1" fill="#d8d8ff"/>
    <circle cx="0" cy="67" r="2" fill="#ffffff"/>
    <!-- Ground electrode with platinum pad -->
    <rect x="6" y="42" width="10" height="4" rx="1" fill="#bbb"/>
    <rect x="13" y="46" width="4" height="16" rx="1" fill="#bbb"/>
    <circle cx="13" cy="62" r="2" fill="#d8d8ff"/>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#aabbff" font-weight="600">Platino doble</text>
    <text x="20" y="358">Gap:</text><text x="100" y="358" fill="#eee" font-weight="600">0.9 mm</text>
    <text x="20" y="376">Vida útil:</text><text x="110" y="376" fill="#eee" font-weight="600">60,000 km</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">Chevrolet Aveo / Spark</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#1a3a88"/>
</svg>
