<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="beltGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="40%" stop-color="#1a1a1a"/><stop offset="60%" stop-color="#333"/><stop offset="100%" stop-color="#111"/></linearGradient>
    <linearGradient id="pulleyGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#555"/><stop offset="40%" stop-color="#ccc"/><stop offset="60%" stop-color="#aaa"/><stop offset="100%" stop-color="#444"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#cc1111"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">GATES</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">TCK328  ·  Kit Banda Distribución</text>
  <g transform="translate(150,225)">
    <!-- Large crankshaft pulley (bottom) -->
    <circle cx="0" cy="80" r="42" fill="url(#pulleyGrad)" stroke="#777" stroke-width="2"/>
    <circle cx="0" cy="80" r="34" fill="#444"/>
    <circle cx="0" cy="80" r="10" fill="#888" stroke="#aaa" stroke-width="1"/>
    <!-- Teeth on large pulley -->
    <g fill="#888">
      <rect x="-3" y="36" width="6" height="5" rx="1"/>
      <rect x="10" y="38" width="6" height="5" rx="1" transform="rotate(18,13,41)"/>
      <rect x="-16" y="38" width="6" height="5" rx="1" transform="rotate(-18,-13,41)"/>
      <rect x="22" y="44" width="6" height="5" rx="1" transform="rotate(36,25,47)"/>
      <rect x="-28" y="44" width="6" height="5" rx="1" transform="rotate(-36,-25,47)"/>
      <rect x="-3" y="120" width="6" height="5" rx="1"/>
      <rect x="10" y="118" width="6" height="5" rx="1" transform="rotate(-18,13,121)"/>
      <rect x="-16" y="118" width="6" height="5" rx="1" transform="rotate(18,-13,121)"/>
    </g>
    <!-- Camshaft pulley (top-left) -->
    <circle cx="-50" cy="-85" r="32" fill="url(#pulleyGrad)" stroke="#777" stroke-width="2"/>
    <circle cx="-50" cy="-85" r="24" fill="#444"/>
    <circle cx="-50" cy="-85" r="8" fill="#888" stroke="#aaa" stroke-width="1"/>
    <!-- Teeth top-left pulley -->
    <g fill="#888">
      <rect x="-53" y="-119" width="6" height="5" rx="1"/>
      <rect x="-38" y="-116" width="6" height="5" rx="1" transform="rotate(18,-35,-113)"/>
      <rect x="-68" y="-116" width="6" height="5" rx="1" transform="rotate(-18,-65,-113)"/>
      <rect x="-53" y="-55" width="6" height="5" rx="1"/>
    </g>
    <!-- Camshaft pulley (top-right) -->
    <circle cx="50" cy="-85" r="32" fill="url(#pulleyGrad)" stroke="#777" stroke-width="2"/>
    <circle cx="50" cy="-85" r="24" fill="#444"/>
    <circle cx="50" cy="-85" r="8" fill="#888" stroke="#aaa" stroke-width="1"/>
    <!-- Tensioner pulley -->
    <circle cx="60" cy="20" r="16" fill="url(#pulleyGrad)" stroke="#777" stroke-width="1.5"/>
    <circle cx="60" cy="20" r="10" fill="#444"/>
    <circle cx="60" cy="20" r="4" fill="#888"/>
    <!-- Idler pulley -->
    <circle cx="-60" cy="20" r="16" fill="url(#pulleyGrad)" stroke="#777" stroke-width="1.5"/>
    <circle cx="-60" cy="20" r="10" fill="#444"/>
    <circle cx="-60" cy="20" r="4" fill="#888"/>
    <!-- Belt (simplified outline with teeth) -->
    <!-- Left side of belt -->
    <rect x="-64" y="-82" width="10" height="98" fill="url(#beltGrad)"/>
    <!-- Belt teeth left side -->
    <rect x="-72" y="-70" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="-58" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="-46" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="-34" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="-22" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="-10" width="8" height="5" rx="1" fill="#333"/>
    <rect x="-72" y="2" width="8" height="5" rx="1" fill="#333"/>
    <!-- Right side of belt -->
    <rect x="54" y="-82" width="10" height="98" fill="url(#beltGrad)"/>
    <!-- Belt teeth right side -->
    <rect x="64" y="-70" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="-58" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="-46" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="-34" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="-22" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="-10" width="8" height="5" rx="1" fill="#333"/>
    <rect x="64" y="2" width="8" height="5" rx="1" fill="#333"/>
    <!-- Top belt -->
    <rect x="-54" y="-100" width="104" height="10" fill="url(#beltGrad)"/>
    <!-- Label GATES on belt -->
    <text x="0" y="-90" text-anchor="middle" font-family="Arial Black,Arial" font-size="8" fill="#cc1111" letter-spacing="1">GATES</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Kit incluye:</text><text x="115" y="340" fill="#eee" font-weight="600">Banda + tensor + polea</text>
    <text x="20" y="358">Dientes banda:</text><text x="140" y="358" fill="#eee" font-weight="600">133</text>
    <text x="20" y="376">Cambio recom.:</text><text x="140" y="376" fill="#eee" font-weight="600">90,000 km</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">VW Jetta / Golf 1.8T</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#cc1111"/>
</svg>
