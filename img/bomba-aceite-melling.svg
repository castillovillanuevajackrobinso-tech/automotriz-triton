<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="alumGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="30%" stop-color="#b8b8b8"/><stop offset="50%" stop-color="#d8d8d8"/><stop offset="70%" stop-color="#a8a8a8"/><stop offset="100%" stop-color="#3a3a3a"/></linearGradient>
    <radialGradient id="gearGrad" cx="50%" cy="50%"><stop offset="0%" stop-color="#c0c0c0"/><stop offset="60%" stop-color="#888"/><stop offset="100%" stop-color="#555"/></radialGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="40" y="18" width="220" height="28" rx="4" fill="#333"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="12" font-weight="900" fill="white" letter-spacing="2">MELLING</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">10295  ·  Bomba de Aceite</text>
  <g transform="translate(150,225)">
    <!-- Housing body -->
    <rect x="-80" y="-100" width="160" height="165" rx="8" fill="url(#alumGrad)"/>
    <!-- Rotor cavity -->
    <circle cx="0" cy="-18" r="55" fill="#2a2a2a" stroke="#777" stroke-width="2"/>
    <!-- Outer rotor -->
    <circle cx="0" cy="-18" r="50" fill="url(#gearGrad)"/>
    <!-- Outer rotor teeth (7 lobes) -->
    <g fill="#c0c0c0" stroke="#888" stroke-width="0.5">
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(51.4,0,-18)"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(102.8,0,-18)"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(154.2,0,-18)"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(205.6,0,-18)"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(257,0,-18)"/>
      <ellipse cx="0" cy="-62" rx="8" ry="12" fill="#b0b0b0" transform="rotate(308.4,0,-18)"/>
    </g>
    <!-- Inner rotor (offset, 6 lobes) -->
    <circle cx="6" cy="-18" r="32" fill="#aaa"/>
    <g fill="#bbb" stroke="#777" stroke-width="0.5">
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8"/>
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8" transform="rotate(60,6,-18)"/>
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8" transform="rotate(120,6,-18)"/>
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8" transform="rotate(180,6,-18)"/>
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8" transform="rotate(240,6,-18)"/>
      <ellipse cx="6" cy="-44" rx="6" ry="10" fill="#c8c8c8" transform="rotate(300,6,-18)"/>
    </g>
    <!-- Center shaft hole -->
    <circle cx="6" cy="-18" r="10" fill="#333"/>
    <circle cx="6" cy="-18" r="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
    <!-- Oil ports -->
    <rect x="-80" y="-35" width="18" height="20" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
    <text x="-71" y="-22" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#aaa">IN</text>
    <rect x="62" y="-35" width="18" height="20" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
    <text x="71" y="-22" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#aaa">OUT</text>
    <!-- Pressure relief valve -->
    <rect x="-25" y="45" width="50" height="14" rx="3" fill="#777"/>
    <text x="0" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ddd">VÁLVULA ALIVIO</text>
    <!-- Bolt holes -->
    <circle cx="-68" cy="-80" r="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
    <circle cx="68" cy="-80" r="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
    <circle cx="-68" cy="50" r="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
    <circle cx="68" cy="50" r="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
    <!-- High volume badge -->
    <rect x="-35" y="68" width="70" height="14" rx="3" fill="#e02020" opacity="0.8"/>
    <text x="0" y="79" text-anchor="middle" font-family="Arial Black,Arial" font-size="8" fill="white" letter-spacing="1">HIGH VOLUME</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#eee" font-weight="600">Rotor desplazamiento</text>
    <text x="20" y="358">Presión máx.:</text><text x="130" y="358" fill="#eee" font-weight="600">60 psi</text>
    <text x="20" y="376">Caudal:</text><text x="110" y="376" fill="#eee" font-weight="600">Alto volumen +10%</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">Silverado / Sierra 5.3L</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#444"/>
</svg>
