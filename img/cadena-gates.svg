<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="sprocketGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="30%" stop-color="#c0c0c0"/><stop offset="50%" stop-color="#e0e0e0"/><stop offset="70%" stop-color="#a8a8a8"/><stop offset="100%" stop-color="#3a3a3a"/></linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#555"/><stop offset="50%" stop-color="#999"/><stop offset="100%" stop-color="#444"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#cc1111"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">GATES</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">TCK195  ·  Cadena de Distribución</text>
  <g transform="translate(150,225)">
    <!-- Large sprocket (crankshaft) -->
    <circle cx="0" cy="75" r="48" fill="url(#sprocketGrad)" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="75" r="38" fill="#333"/>
    <circle cx="0" cy="75" r="10" fill="#777" stroke="#aaa" stroke-width="1"/>
    <!-- Crank sprocket teeth (16 teeth) -->
    <g fill="#bbb" stroke="#888" stroke-width="0.5">
      <rect x="-4" y="23" width="8" height="8" rx="2"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(22.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(45,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(67.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(90,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(112.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(135,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(157.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(180,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(202.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(225,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(247.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(270,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(292.5,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(315,0,75)"/>
      <rect x="-4" y="23" width="8" height="8" rx="2" transform="rotate(337.5,0,75)"/>
    </g>
    <!-- Small sprocket (camshaft) -->
    <circle cx="0" cy="-80" r="32" fill="url(#sprocketGrad)" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="-80" r="24" fill="#333"/>
    <circle cx="0" cy="-80" r="8" fill="#777" stroke="#aaa" stroke-width="1"/>
    <!-- Cam sprocket teeth (12 teeth) -->
    <g fill="#bbb" stroke="#888" stroke-width="0.5">
      <rect x="-3" y="-114" width="6" height="7" rx="1.5"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(30,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(60,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(90,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(120,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(150,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(180,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(210,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(240,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(270,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(300,0,-80)"/>
      <rect x="-3" y="-114" width="6" height="7" rx="1.5" transform="rotate(330,0,-80)"/>
    </g>
    <!-- Chain links - left side -->
    <g fill="url(#chainGrad)" stroke="#666" stroke-width="0.5">
      <rect x="-42" y="-64" width="18" height="10" rx="3"/><rect x="-42" y="-52" width="18" height="10" rx="3"/>
      <rect x="-42" y="-40" width="18" height="10" rx="3"/><rect x="-42" y="-28" width="18" height="10" rx="3"/>
      <rect x="-42" y="-16" width="18" height="10" rx="3"/><rect x="-42" y="-4" width="18" height="10" rx="3"/>
      <rect x="-42" y="8" width="18" height="10" rx="3"/><rect x="-42" y="20" width="18" height="10" rx="3"/>
      <rect x="-42" y="32" width="18" height="10" rx="3"/>
    </g>
    <!-- Chain links - right side -->
    <g fill="url(#chainGrad)" stroke="#666" stroke-width="0.5">
      <rect x="24" y="-64" width="18" height="10" rx="3"/><rect x="24" y="-52" width="18" height="10" rx="3"/>
      <rect x="24" y="-40" width="18" height="10" rx="3"/><rect x="24" y="-28" width="18" height="10" rx="3"/>
      <rect x="24" y="-16" width="18" height="10" rx="3"/><rect x="24" y="-4" width="18" height="10" rx="3"/>
      <rect x="24" y="8" width="18" height="10" rx="3"/><rect x="24" y="20" width="18" height="10" rx="3"/>
      <rect x="24" y="32" width="18" height="10" rx="3"/>
    </g>
    <!-- Tensioner guide (right side) -->
    <path d="M44,-60 Q55,-10 44,36" fill="none" stroke="#cc1111" stroke-width="5" stroke-linecap="round"/>
    <text x="70" y="-12" font-family="Arial,sans-serif" font-size="8" fill="#cc1111">TENSOR</text>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#eee" font-weight="600">Cadena simple</text>
    <text x="20" y="358">Eslabones:</text><text x="120" y="358" fill="#eee" font-weight="600">128 · Pitch 9.525 mm</text>
    <text x="20" y="376">Cambio recom.:</text><text x="140" y="376" fill="#eee" font-weight="600">150,000 km</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">Honda Civic / CR-V 1.8L</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#cc1111"/>
</svg>
