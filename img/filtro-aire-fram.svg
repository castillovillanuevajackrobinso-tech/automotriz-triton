<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#252525"/></linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cc6600"/><stop offset="100%" stop-color="#884400"/></linearGradient>
  </defs>
  <rect width="300" height="420" fill="url(#bg)" rx="12"/>
  <rect x="50" y="18" width="200" height="28" rx="4" fill="#cc5500"/>
  <text x="150" y="37" text-anchor="middle" font-family="Arial Black,Arial" font-size="13" font-weight="900" fill="white" letter-spacing="2">FRAM</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa" letter-spacing="1">CA8039  ·  Filtro de Aire Panel</text>
  <g transform="translate(150,225)">
    <!-- Outer frame (orange) -->
    <rect x="-100" y="-120" width="200" height="180" rx="6" fill="url(#frameGrad)"/>
    <!-- Inner filter media (pleated paper) -->
    <rect x="-88" y="-108" width="176" height="156" rx="3" fill="#f5e8c0"/>
    <!-- Pleats simulation -->
    <line x1="-88" y1="-108" x2="-88" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="-76" y1="-108" x2="-76" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="-64" y1="-108" x2="-64" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="-52" y1="-108" x2="-52" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="-40" y1="-108" x2="-40" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="-28" y1="-108" x2="-28" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="-16" y1="-108" x2="-16" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="-4" y1="-108" x2="-4" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="8" y1="-108" x2="8" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="20" y1="-108" x2="20" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="32" y1="-108" x2="32" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="44" y1="-108" x2="44" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="56" y1="-108" x2="56" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="68" y1="-108" x2="68" y2="48" stroke="#d0b888" stroke-width="0.8"/>
    <line x1="80" y1="-108" x2="80" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <line x1="88" y1="-108" x2="88" y2="48" stroke="#c8b080" stroke-width="1.5"/>
    <!-- FRAM Label overlay -->
    <rect x="-45" y="-30" width="90" height="42" rx="3" fill="#cc5500" opacity="0.9"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial Black,Arial" font-size="16" fill="white" font-weight="900">FRAM</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ffcc88" letter-spacing="1">CA8039</text>
    <!-- Corner seals -->
    <rect x="-100" y="-120" width="200" height="8" rx="6" fill="#884400"/>
    <rect x="-100" y="44" width="200" height="8" rx="3" fill="#884400"/>
  </g>
  <g font-family="Arial,sans-serif" font-size="10" fill="#aaa">
    <text x="20" y="340">Tipo:</text><text x="100" y="340" fill="#eee" font-weight="600">Panel plano</text>
    <text x="20" y="358">Medidas:</text><text x="110" y="358" fill="#eee" font-weight="600">245 × 165 × 40 mm</text>
    <text x="20" y="376">Material:</text><text x="110" y="376" fill="#eee" font-weight="600">Fibra sintética</text>
    <text x="20" y="394">Motor:</text><text x="100" y="394" fill="#eee" font-weight="600">Nissan Sentra / Tsuru / Tiida</text>
  </g>
  <rect x="0" y="408" width="300" height="12" rx="0" fill="#cc5500"/>
</svg>
